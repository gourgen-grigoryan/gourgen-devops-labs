<svg width="1600" height="520" viewBox="0 0 1600 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Gourgen DevOps Labs Luxury Banner</title>
  <desc id="desc">Luxury black and gold DevOps learning portfolio banner with clean spacing, premium glass panels, and a roadmap pipeline.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="520" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#02030A"/>
      <stop offset="0.48" stop-color="#070B14"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>

    <radialGradient id="goldAura" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1260 90) rotate(145) scale(580 340)">
      <stop stop-color="#D4AF37" stop-opacity="0.34"/>
      <stop offset="0.45" stop-color="#B8860B" stop-opacity="0.13"/>
      <stop offset="1" stop-color="#D4AF37" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="blueAura" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(260 420) rotate(-18) scale(520 310)">
      <stop stop-color="#38BDF8" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#38BDF8" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="panel" x1="120" y1="72" x2="1480" y2="448" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111827" stop-opacity="0.96"/>
      <stop offset="0.55" stop-color="#050814" stop-opacity="0.97"/>
      <stop offset="1" stop-color="#02030A" stop-opacity="0.98"/>
    </linearGradient>

    <linearGradient id="goldBorder" x1="120" y1="78" x2="1480" y2="442" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8A6A20"/>
      <stop offset="0.22" stop-color="#F5D76E"/>
      <stop offset="0.52" stop-color="#B8892E"/>
      <stop offset="0.78" stop-color="#F8E7A1"/>
      <stop offset="1" stop-color="#765315"/>
    </linearGradient>

    <linearGradient id="goldText" x1="0" y1="0" x2="760" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF6C7"/>
      <stop offset="0.28" stop-color="#D4AF37"/>
      <stop offset="0.58" stop-color="#F7E6A1"/>
      <stop offset="1" stop-color="#A9741A"/>
    </linearGradient>

    <linearGradient id="terminalTop" x1="0" y1="0" x2="440" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1F2937"/>
      <stop offset="1" stop-color="#0B1120"/>
    </linearGradient>

    <linearGradient id="flow" x1="0" y1="0" x2="700" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#D4AF37"/>
      <stop offset="0.34" stop-color="#F8E7A1"/>
      <stop offset="0.68" stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#D4AF37"/>
    </linearGradient>

    <filter id="largeShadow" x="-18%" y="-28%" width="136%" height="156%">
      <feDropShadow dx="0" dy="24" stdDeviation="26" flood-color="#000000" flood-opacity="0.58"/>
    </filter>

    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="goldGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#D4AF37" flood-opacity="0.30"/>
    </filter>

    <pattern id="grid" width="52" height="52" patternUnits="userSpaceOnUse">
      <path d="M 52 0 L 0 0 0 52" fill="none" stroke="#E5E7EB" stroke-opacity="0.035" stroke-width="1"/>
    </pattern>

    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.1" fill="#D4AF37" fill-opacity="0.11"/>
    </pattern>
  </defs>

  <rect width="1600" height="520" fill="url(#bg)"/>
  <rect width="1600" height="520" fill="url(#grid)"/>
  <rect width="1600" height="520" fill="url(#dots)" opacity="0.55"/>
  <rect width="1600" height="520" fill="url(#goldAura)"/>
  <rect width="1600" height="520" fill="url(#blueAura)"/>

  <!-- Premium diagonal light lines -->
  <g opacity="0.34">
    <path d="M-40 436 C340 306 528 226 902 58" stroke="#D4AF37" stroke-opacity="0.10" stroke-width="2"/>
    <path d="M420 528 C750 364 1030 204 1640 78" stroke="#F8E7A1" stroke-opacity="0.08" stroke-width="2"/>
    <path d="M1260 -40 C1170 110 1070 214 920 332" stroke="#38BDF8" stroke-opacity="0.09" stroke-width="2"/>
  </g>

  <!-- Main premium panel -->
  <rect x="112" y="70" width="1376" height="380" rx="36" fill="url(#goldBorder)" opacity="0.95" filter="url(#largeShadow)"/>
  <rect x="115" y="73" width="1370" height="374" rx="34" fill="url(#panel)"/>
  <rect x="134" y="92" width="1332" height="336" rx="27" stroke="#FFFFFF" stroke-opacity="0.075"/>
  <rect x="135" y="93" width="1330" height="334" rx="26" stroke="#D4AF37" stroke-opacity="0.12"/>

  <!-- Left terminal card -->
  <g transform="translate(180 128)">
    <rect width="430" height="264" rx="22" fill="#030712" stroke="#D4AF37" stroke-opacity="0.36" stroke-width="1.4"/>
    <rect x="1" y="1" width="428" height="54" rx="21" fill="url(#terminalTop)"/>
    <rect x="1" y="37" width="428" height="18" fill="url(#terminalTop)"/>
    <circle cx="34" cy="27" r="7" fill="#F87171"/>
    <circle cx="58" cy="27" r="7" fill="#FBBF24"/>
    <circle cx="82" cy="27" r="7" fill="#34D399"/>
    <text x="123" y="32" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="800" letter-spacing="2.2" fill="#D4AF37">DEVOPS TERMINAL</text>

    <text x="28" y="92" font-family="Consolas, Monaco, monospace" font-size="20" fill="#D4AF37">$ roadmap status</text>
    <text x="28" y="130" font-family="Consolas, Monaco, monospace" font-size="19" fill="#E5E7EB">Linux Fundamentals</text>
    <text x="326" y="130" font-family="Consolas, Monaco, monospace" font-size="19" fill="#34D399">DONE</text>
    <text x="28" y="167" font-family="Consolas, Monaco, monospace" font-size="19" fill="#E5E7EB">Networking Labs</text>
    <text x="326" y="167" font-family="Consolas, Monaco, monospace" font-size="19" fill="#F8E7A1">ACTIVE</text>
    <text x="28" y="204" font-family="Consolas, Monaco, monospace" font-size="19" fill="#E5E7EB">CI/CD Portfolio</text>
    <text x="326" y="204" font-family="Consolas, Monaco, monospace" font-size="19" fill="#38BDF8">NEXT</text>
    <rect x="28" y="228" width="374" height="1" fill="#D4AF37" opacity="0.22"/>
    <text x="28" y="249" font-family="Consolas, Monaco, monospace" font-size="14" fill="#94A3B8">learning-by-building / production-minded</text>
  </g>

  <!-- Main text block -->
  <g transform="translate(670 118)">
    <text x="0" y="28" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="900" fill="#D4AF37" letter-spacing="5.5">DEVOPS LEARNING PORTFOLIO</text>
    <text x="0" y="94" font-family="Georgia, 'Times New Roman', serif" font-size="62" font-weight="700" fill="url(#goldText)" letter-spacing="0.5">Gourgen DevOps Labs</text>
    <text x="0" y="142" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="500" fill="#CBD5E1">Hands-on labs • bilingual documentation • real portfolio growth</text>

    <!-- luxury chips -->
    <g transform="translate(0 180)">
      <rect x="0" y="0" width="142" height="42" rx="21" fill="#0B1220" stroke="#D4AF37" stroke-opacity="0.72"/>
      <text x="71" y="27" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="900" text-anchor="middle" fill="#F8E7A1">Linux ✓</text>

      <rect x="160" y="0" width="170" height="42" rx="21" fill="#0B1220" stroke="#D4AF37" stroke-opacity="0.48"/>
      <text x="245" y="27" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="900" text-anchor="middle" fill="#F8FAFC">Networking</text>

      <rect x="348" y="0" width="132" height="42" rx="21" fill="#0B1220" stroke="#D4AF37" stroke-opacity="0.48"/>
      <text x="414" y="27" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="900" text-anchor="middle" fill="#F8FAFC">Docker</text>

      <rect x="498" y="0" width="118" height="42" rx="21" fill="#0B1220" stroke="#D4AF37" stroke-opacity="0.48"/>
      <text x="557" y="27" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="900" text-anchor="middle" fill="#F8FAFC">CI/CD</text>

      <rect x="634" y="0" width="118" height="42" rx="21" fill="#0B1220" stroke="#D4AF37" stroke-opacity="0.48"/>
      <text x="693" y="27" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="900" text-anchor="middle" fill="#F8FAFC">Cloud</text>
    </g>
  </g>

  <!-- Roadmap pipeline -->
  <g transform="translate(670 372)" filter="url(#softGlow)">
    <line x1="0" y1="0" x2="694" y2="0" stroke="#3B4252" stroke-width="10" stroke-linecap="round" opacity="0.52"/>
    <line x1="0" y1="0" x2="694" y2="0" stroke="url(#flow)" stroke-width="4" stroke-linecap="round"/>

    <g font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="900" text-anchor="middle">
      <circle cx="0" cy="0" r="10" fill="#D4AF37" filter="url(#goldGlow)"/>
      <circle cx="99" cy="0" r="10" fill="#F8E7A1"/>
      <circle cx="198" cy="0" r="10" fill="#D4AF37"/>
      <circle cx="297" cy="0" r="10" fill="#38BDF8"/>
      <circle cx="396" cy="0" r="10" fill="#D4AF37"/>
      <circle cx="495" cy="0" r="10" fill="#F8E7A1"/>
      <circle cx="594" cy="0" r="10" fill="#38BDF8"/>
      <circle cx="694" cy="0" r="10" fill="#D4AF37"/>

      <text x="0" y="38" fill="#D7DBE5">Linux</text>
      <text x="99" y="38" fill="#D7DBE5">Network</text>
      <text x="198" y="38" fill="#D7DBE5">Git/Bash</text>
      <text x="297" y="38" fill="#D7DBE5">Docker</text>
      <text x="396" y="38" fill="#D7DBE5">CI/CD</text>
      <text x="495" y="38" fill="#D7DBE5">Cloud</text>
      <text x="594" y="38" fill="#D7DBE5">Monitor</text>
      <text x="694" y="38" fill="#D7DBE5">K8s</text>
    </g>
  </g>

  <!-- Right abstract architecture mark -->
  <g transform="translate(1318 116)" opacity="0.90">
    <circle cx="0" cy="0" r="4" fill="#D4AF37"/>
    <circle cx="62" cy="44" r="4" fill="#F8E7A1"/>
    <circle cx="20" cy="108" r="4" fill="#38BDF8"/>
    <circle cx="92" cy="138" r="4" fill="#D4AF37"/>
    <path d="M0 0 L62 44 L20 108 L92 138" stroke="#D4AF37" stroke-opacity="0.38" stroke-width="2"/>
    <path d="M62 44 L92 138" stroke="#38BDF8" stroke-opacity="0.28" stroke-width="2"/>
    <circle cx="44" cy="72" r="74" stroke="#D4AF37" stroke-opacity="0.13" stroke-width="2"/>
  </g>

  <!-- Corner ornaments -->
  <g opacity="0.26">
    <path d="M158 116 L158 96 L178 96" stroke="#F8E7A1" stroke-width="2" stroke-linecap="round"/>
    <path d="M1442 404 L1442 424 L1422 424" stroke="#F8E7A1" stroke-width="2" stroke-linecap="round"/>
    <text x="87" y="62" font-family="Consolas, Monaco, monospace" font-size="28" fill="#D4AF37">{ }</text>
    <text x="1396" y="476" font-family="Consolas, Monaco, monospace" font-size="26" fill="#38BDF8">&lt;/&gt;</text>
  </g>
</svg>
